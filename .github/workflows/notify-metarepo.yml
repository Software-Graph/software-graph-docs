# Notify meta-repo when this repo's dev branch is updated
#
# This triggers the Software-Graph meta-repo to update its submodule ref,
# so dev pushes automatically update the meta-repo's tracked dev pointer.
#
# Requires: MESH_TOKEN secret (same token used for cross-repo operations)

name: Notify Meta-Repo

on:
  push:
    branches:
      - dev

concurrency:
  group: notify-metarepo-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  notify:
    # This file lives in the meta-repo as a template, so avoid self-dispatch loops.
    if: github.repository != 'Software-Graph/Software-Graph'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger meta-repo sync
        env:
          # Use MESH_TOKEN - the same PAT used for cross-repo issue creation
          GH_TOKEN: ${{ secrets.MESH_TOKEN }}
        run: |
          set -euo pipefail

          # Extract repo name from github.repository (e.g., "Software-Graph/jb-auth" -> "jb-auth")
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BRANCH="${GITHUB_REF_NAME}"
          
          echo "Notifying meta-repo: $REPO_NAME updated on $BRANCH"
          
          # Send repository_dispatch to meta-repo
          curl --fail-with-body --silent --show-error \
            --retry 3 --retry-delay 2 --retry-connrefused \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/Software-Graph/Software-Graph/dispatches" \
            -d "{\"event_type\":\"submodule-updated\",\"client_payload\":{\"submodule\":\"$REPO_NAME\",\"branch\":\"$BRANCH\",\"sha\":\"$GITHUB_SHA\"}}"
          
          echo "✓ Meta-repo notified"
